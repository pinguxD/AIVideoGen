{% extends 'base.html' %}{% block content %}<h1>Hooks & Audio</h1><table><tr><th>Hook type</th><th>Videos</th><th>Avg Views</th><th>Avg Opp</th><th>Best</th></tr>{% for h in hooks %}<tr><td>{{h.name}}</td><td>{{h.count}}</td><td>{{'{:,}'.format(h.avg_views)}}</td><td>{{h.avg_opp}}</td><td><a href="{{h.best.url}}" target="_blank">{{h.best.title}}</a></td></tr>{% endfor %}</table>{% endblock %}
